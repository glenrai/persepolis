<script>
const total=158,pageInput=document.getElementById('pageInput');
function step(){return document.body.classList.contains('single')?1:2}
function go(n){n=Math.max(1,Math.min(total,Number(n)||1));pageInput.value=n;document.getElementById('page-'+n).scrollIntoView({behavior:'smooth',block:'start'})}
document.getElementById('prev').onclick=()=>go(+pageInput.value-step());
document.getElementById('next').onclick=()=>go(+pageInput.value+step());
pageInput.onchange=()=>go(pageInput.value);
document.getElementById('zoom').oninput=e=>document.documentElement.style.setProperty('--page-width',e.target.value+'px');
document.getElementById('viewMode').onclick=e=>{document.body.classList.toggle('single');e.target.textContent=document.body.classList.contains('single')?'Two pages':'Single page'};
document.getElementById('theme').onclick=e=>{document.body.classList.toggle('dark');e.target.textContent=document.body.classList.contains('dark')?'Light mode':'Dark mode'};
document.getElementById('full').onclick=()=>{if(!document.fullscreenElement)document.documentElement.requestFullscreen?.();else document.exitFullscreen?.()};
const obs=new IntersectionObserver(entries=>{const visible=entries.filter(e=>e.isIntersecting).sort((a,b)=>a.boundingClientRect.left-b.boundingClientRect.left);if(visible.length){const n=visible[0].target.id.split('-')[1];pageInput.value=n;history.replaceState(null,'','#page-'+n)}},{threshold:.55});
document.querySelectorAll('.page').forEach(p=>obs.observe(p));
window.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='PageDown')go(+pageInput.value+step());if(e.key==='ArrowLeft'||e.key==='PageUp')go(+pageInput.value-step())});
if(location.hash){const n=location.hash.match(/page-(\d+)/)?.[1];if(n)setTimeout(()=>go(n),100)}
</script></body></html>
