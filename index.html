<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <title>Persepolis: The Story of a Childhood</title>

  <style>
    :root {
      --bg: #ececec;
      --panel: #ffffff;
      --text: #171717;
      --muted: #666666;
      --shadow: 0 4px 22px rgba(0, 0, 0, 0.16);
      --page-width: 560px;
      --gap: 18px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family:
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;

      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;

      padding: 10px 14px;

      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(12px);

      border-bottom: 1px solid #cccccc;
    }

    .title {
      margin-right: auto;
      font-weight: 750;
    }

    .controls {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    button,
    input {
      font: inherit;
    }

    button {
      padding: 7px 10px;
      cursor: pointer;

      background: #ffffff;
      border: 1px solid #aaaaaa;
      border-radius: 8px;
    }

    button:hover {
      background: #f2f2f2;
    }

    input[type="number"] {
      width: 70px;
      padding: 7px;

      border: 1px solid #aaaaaa;
      border-radius: 8px;
    }

    input[type="range"] {
      width: 130px;
    }

    main {
      display: grid;
      grid-template-columns:
        repeat(2, minmax(0, var(--page-width)));

      justify-content: center;
      align-items: start;

      gap: 28px var(--gap);

      padding: 22px 12px 60px;
    }

    .page {
      width: var(--page-width);
      margin: 0;

      background: var(--panel);
      box-shadow: var(--shadow);

      line-height: 0;
    }

    .page img {
      display: block;
      width: 100%;
      height: auto;
    }

    figcaption {
      padding: 8px;

      background: #fafafa;
      color: var(--muted);

      font-size: 12px;
      line-height: 1.3;
      text-align: center;
    }

    body.single main {
      grid-template-columns:
        minmax(0, var(--page-width));
    }

    body.dark {
      --bg: #151515;
      --panel: #222222;
      --text: #eeeeee;
      --muted: #bbbbbb;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.55);
    }

    body.dark header {
      background: rgba(28, 28, 28, 0.94);
      border-color: #444444;
    }

    body.dark button,
    body.dark input {
      background: #2b2b2b;
      color: #eeeeee;
      border-color: #666666;
    }

    body.dark figcaption {
      background: #222222;
    }

    @media (max-width: 900px) {
      main {
        grid-template-columns:
          minmax(0, min(var(--page-width), 96vw));
      }

      .page {
        width: min(var(--page-width), 96vw);
      }

      #viewMode {
        display: none;
      }
    }

    @media print {
      header,
      figcaption {
        display: none;
      }

      body {
        background: #ffffff;
      }

      main {
        display: grid;
        grid-template-columns: 1fr 1fr;

        gap: 0;
        padding: 0;
      }

      .page {
        width: 100%;
        margin: 0;

        box-shadow: none;
        break-inside: avoid;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="title">
      Persepolis: The Story of a Childhood
    </div>

    <div class="controls">
      <button id="prev" type="button">
        Previous
      </button>

      <label>
        Page

        <input
          id="pageInput"
          type="number"
          min="1"
          max="158"
          value="1"
        >

        / 158
      </label>

      <button id="next" type="button">
        Next
      </button>

      <label>
        Page width

        <input
          id="zoom"
          type="range"
          min="320"
          max="760"
          step="20"
          value="560"
        >
      </label>

      <button id="viewMode" type="button">
        Single page
      </button>

      <button id="theme" type="button">
        Dark mode
      </button>

      <button id="full" type="button">
        Fullscreen
      </button>
    </div>
  </header>

  <main id="reader"></main>

  <script>
    const totalPages = 158;

    const reader = document.getElementById("reader");
    const pageInput = document.getElementById("pageInput");
    const previousButton = document.getElementById("prev");
    const nextButton = document.getElementById("next");
    const zoomControl = document.getElementById("zoom");
    const viewModeButton = document.getElementById("viewMode");
    const themeButton = document.getElementById("theme");
    const fullscreenButton = document.getElementById("full");

    /*
      Create all pages automatically.

      Images are stored in the repository root:

      page-001.jpg
      page-002.jpg
      page-003.jpg
      etc.
    */

    for (let pageNumber = 1; pageNumber <= totalPages; pageNumber++) {
      const paddedNumber = String(pageNumber).padStart(3, "0");

      const figure = document.createElement("figure");

      figure.className = "page";
      figure.id = `page-${pageNumber}`;

      const image = document.createElement("img");

      image.src = `page-${paddedNumber}.jpg`;
      image.alt = `Persepolis page ${pageNumber}`;
      image.loading = pageNumber <= 4 ? "eager" : "lazy";

      const caption = document.createElement("figcaption");

      caption.textContent =
        `Page ${pageNumber} of ${totalPages}`;

      figure.appendChild(image);
      figure.appendChild(caption);

      reader.appendChild(figure);
    }

    function pageStep() {
      return document.body.classList.contains("single")
        ? 1
        : 2;
    }

    function goToPage(pageNumber) {
      let targetPage = Number(pageNumber);

      if (!Number.isFinite(targetPage)) {
        targetPage = 1;
      }

      targetPage = Math.max(
        1,
        Math.min(totalPages, targetPage)
      );

      pageInput.value = targetPage;

      const target = document.getElementById(
        `page-${targetPage}`
      );

      if (target) {
        target.scrollIntoView({
          behavior: "smooth",
          block: "start"
        });
      }
    }

    previousButton.addEventListener("click", () => {
      goToPage(
        Number(pageInput.value) - pageStep()
      );
    });

    nextButton.addEventListener("click", () => {
      goToPage(
        Number(pageInput.value) + pageStep()
      );
    });

    pageInput.addEventListener("change", () => {
      goToPage(pageInput.value);
    });

    zoomControl.addEventListener("input", event => {
      document.documentElement.style.setProperty(
        "--page-width",
        `${event.target.value}px`
      );
    });

    viewModeButton.addEventListener("click", () => {
      document.body.classList.toggle("single");

      viewModeButton.textContent =
        document.body.classList.contains("single")
          ? "Two pages"
          : "Single page";
    });

    themeButton.addEventListener("click", () => {
      document.body.classList.toggle("dark");

      themeButton.textContent =
        document.body.classList.contains("dark")
          ? "Light mode"
          : "Dark mode";
    });

    fullscreenButton.addEventListener("click", async () => {
      try {
        if (!document.fullscreenElement) {
          await document.documentElement.requestFullscreen();
        } else {
          await document.exitFullscreen();
        }
      } catch (error) {
        console.error(
          "Fullscreen mode could not be activated.",
          error
        );
      }
    });

    const pageObserver = new IntersectionObserver(
      entries => {
        const visiblePages = entries
          .filter(entry => entry.isIntersecting)
          .sort(
            (first, second) =>
              first.boundingClientRect.left -
              second.boundingClientRect.left
          );

        if (visiblePages.length === 0) {
          return;
        }

        const pageNumber =
          visiblePages[0].target.id.split("-")[1];

        pageInput.value = pageNumber;

        history.replaceState(
          null,
          "",
          `#page-${pageNumber}`
        );
      },
      {
        threshold: 0.55
      }
    );

    document
      .querySelectorAll(".page")
      .forEach(page => pageObserver.observe(page));

    window.addEventListener("keydown", event => {
      if (
        event.key === "ArrowRight" ||
        event.key === "PageDown"
      ) {
        goToPage(
          Number(pageInput.value) + pageStep()
        );
      }

      if (
        event.key === "ArrowLeft" ||
        event.key === "PageUp"
      ) {
        goToPage(
          Number(pageInput.value) - pageStep()
        );
      }
    });

    const hashPage =
      window.location.hash.match(/page-(\d+)/)?.[1];

    if (hashPage) {
      window.setTimeout(() => {
        goToPage(hashPage);
      }, 100);
    }
  </script>
</body>
</html>
